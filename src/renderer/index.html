<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Ascii Sprite Editor</title>
  <link rel="stylesheet" href="./css/sprite-editor.css" />
</head>

<body>
  <h1>Ascii Sprite Editor</h1>

  <div id="editor">
    <div id="toppane">
      <form>
        <label>Canvas Size:</label>
        <input id="canvaswidth" type="number" value="10" />x<input id="canvasheight" type="number" value="5" />
      </form>
    </div>

    <div id="leftpane">
      <button id="playBtn">Play</button>
      <button id="stopBtn">Stop</button>
      <button id="saveBtn">Save</button>
      <canvas id="frameSelectorCanvas" width="100" height="400"></canvas>
      <button id="insertFrame">Insert Frame</button>
    </div>

    <canvas id="editorCanvas" width="800" height="600"></canvas>

    <div id="rightpane">
      <label>Foreground Color:</label>
      <input id="fgColor" type="color" value="#ffffff" />
      <label>Background Color:</label>
      <input id="bgColor" type="color" value="#000000" />
    </div>

    <div id="bottompane">
      <label>Duration (milliseconds)</label>
      <input type="number" value="250" />
    </div>
  </div>

  <script type="module" src="./index.ts"></script>
</body>

</html>
